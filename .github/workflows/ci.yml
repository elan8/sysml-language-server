# CI: build, test, and (optional) run SysML v2 validation suite
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -W clippy::all

  validation:
    name: SysML v2 validation suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Pin to release tag 2026-01; update -b if using a different release (https://github.com/Systems-Modeling/SysML-v2-Release/releases)
      - name: Clone SysML v2 Release
        run: |
          git clone --depth 1 https://github.com/Systems-Modeling/SysML-v2-Release.git "$RELEASE_ROOT" -b 2026-01
        env:
          RELEASE_ROOT: ${{ runner.temp }}/SysML-v2-Release-2026-01

      - name: cargo test (kerml-parser with validation)
        run: cargo test -p kerml-parser
        env:
          SYSML_V2_RELEASE_DIR: ${{ runner.temp }}/SysML-v2-Release-2026-01

  extension-tests:
    name: VS Code extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build server
        run: cargo build --release -p sysml-language-server

      - name: Add server to PATH
        run: echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH

      - name: npm ci (vscode)
        run: cd vscode && npm ci

      - name: npm run compile
        run: cd vscode && npm run compile

      - name: npm test (extension tests)
        run: cd vscode && npm test
