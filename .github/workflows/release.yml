# Release: build server binaries and VS Code extension, create GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Leave empty to use the tag that triggered the workflow."
        required: false

env:
  BINARY_NAME: sysml-language-server

jobs:
  build-server:
    name: Build server (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            archive_ext: tar.gz
            binary_ext: ""
          - runner: macos-latest
            os_name: darwin
            archive_ext: tar.gz
            binary_ext: ""
          - runner: windows-latest
            os_name: win32
            archive_ext: zip
            binary_ext: ".exe"

    steps:
      - name: Resolve tag and version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p sysml-language-server

      - name: Prepare archive (Unix)
        if: matrix.binary_ext == ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BIN="${{ env.BINARY_NAME }}${{ matrix.binary_ext }}"
          ARCHIVE="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.os_name }}-x64.${{ matrix.archive_ext }}"
          mkdir -p staging
          cp "target/release/${{ env.BINARY_NAME }}" "staging/$BIN"
          tar czf "$ARCHIVE" -C staging "$BIN"
          echo "ARCHIVE_NAME=$ARCHIVE" >> $GITHUB_ENV

      - name: Prepare archive (Windows)
        if: matrix.binary_ext == '.exe'
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $archive = "${{ env.BINARY_NAME }}-$version-${{ matrix.os_name }}-x64.zip"
          Compress-Archive -Path "target/release/${{ env.BINARY_NAME }}.exe" -DestinationPath $archive
          echo "ARCHIVE_NAME=$archive" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.os_name }}
          path: ${{ env.BINARY_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.os_name }}-x64.${{ matrix.archive_ext }}

  package-extension-with-server:
    name: Package extension with server (all platforms)
    runs-on: ubuntu-latest
    needs: [build-server]
    steps:
      - name: Resolve tag and version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: artifacts/server
          merge-multiple: false

      - name: Unpack server binaries into vscode/server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BIN="${{ env.BINARY_NAME }}"
          mkdir -p vscode/server/linux-x64 vscode/server/darwin-x64 vscode/server/win32-x64
          tar -xzf "artifacts/server/server-linux/${BIN}-${VERSION}-linux-x64.tar.gz" -C vscode/server/linux-x64
          tar -xzf "artifacts/server/server-darwin/${BIN}-${VERSION}-darwin-x64.tar.gz" -C vscode/server/darwin-x64
          unzip -o -j "artifacts/server/server-win32/${BIN}-${VERSION}-win32-x64.zip" -d vscode/server/win32-x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode/package-lock.json

      - name: Install vscode deps and package
        run: |
          cd vscode && npm ci && npm run compile && npm run package

      - name: Upload extension artifact (bundled)
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: vscode/*.vsix

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-server, package-extension-with-server]
    permissions:
      contents: write
    steps:
      - name: Resolve tag and version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Checkout (for tag ref on manual run)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag || github.ref }}

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: artifacts/server
          merge-multiple: false

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: artifacts/extension

      - name: List release assets
        run: |
          echo "Server binaries:"
          find artifacts/server -type f
          echo "Extension:"
          find artifacts/extension -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            Release ${{ steps.version.outputs.tag }}.
            The VS Code extension (.vsix) includes the language server; install it for one-click use. Server-only archives are also attached for use with other editors.
          files: |
            artifacts/server/*/*
            artifacts/extension/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
